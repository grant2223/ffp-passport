<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meetups — FFP Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1980AD;
  --blue-lt: #2ba8e0;
  --blue-dk: #0f5a7a;
  --navy: #0b1c28;
  --navy-2: #0d2030;
  --navy-card: #0f1e2e;
  --navy-deep: #081420;
  --green: #22c55e;
  --muted: #6a90a8;
  --muted-lt: #9dbdd0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  background: var(--navy-deep);
  color: #fff;
}

.page { min-height: 100vh; padding: 40px 20px; }

.container {
  max-width: 900px;
  margin: 0 auto;
}

.header {
  margin-bottom: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.header-content h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
}

.header-content p {
  color: var(--muted-lt);
  font-size: 14px;
}

.btn-create {
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}

.btn-create:hover {
  transform: translateY(-2px);
}

.meetups-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 40px;
}

.meetup-card {
  background: var(--navy-card);
  border: 1px solid rgba(43, 168, 224, 0.12);
  border-radius: 12px;
  padding: 24px;
  transition: all 0.3s;
  cursor: pointer;
}

.meetup-card:hover {
  border-color: var(--blue-lt);
  box-shadow: 0 8px 24px rgba(43, 168, 224, 0.15);
}

.meetup-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  margin-bottom: 16px;
  gap: 16px;
}

.meetup-title {
  font-size: 18px;
  font-weight: 900;
  flex: 1;
}

.meetup-status {
  display: inline-block;
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 800;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
}

.meetup-creator {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 12px;
}

.meetup-creator-link {
  color: var(--blue-lt);
  text-decoration: none;
  font-weight: 700;
}

.meetup-description {
  font-size: 13px;
  color: var(--muted-lt);
  line-height: 1.6;
  margin-bottom: 16px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.meetup-details {
  display: grid;
  grid-template-columns: auto auto auto auto;
  gap: 20px;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(43, 168, 224, 0.1);
  font-size: 12px;
}

.meetup-detail {
  display: flex;
  align-items: center;
  gap: 6px;
}

.meetup-detail-label {
  color: var(--muted);
  text-transform: uppercase;
  font-size: 9px;
  font-weight: 800;
}

.meetup-detail-value {
  color: #fff;
  font-weight: 700;
}

.meetup-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.attendees {
  font-size: 12px;
  color: var(--muted-lt);
}

.attendees-strong {
  font-weight: 900;
  color: var(--blue-lt);
}

.meetup-actions {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  font-family: 'Montserrat', sans-serif;
  transition: all 0.2s;
}

.btn-join {
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: #fff;
}

.btn-join:hover {
  transform: translateY(-1px);
}

.btn-leave {
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.3);
  color: #ff6b6b;
}

.btn-leave:hover {
  border-color: #ff6b6b;
}

.btn-view {
  background: rgba(43, 168, 224, 0.1);
  border: 1px solid rgba(43, 168, 224, 0.3);
  color: var(--blue-lt);
  text-decoration: none;
  display: inline-block;
}

.loading-skeleton {
  background: var(--navy-card);
  border: 1px solid rgba(43, 168, 224, 0.12);
  border-radius: 12px;
  padding: 24px;
  animation: pulse 2s infinite;
}

.skeleton-line {
  height: 12px;
  background: rgba(43, 168, 224, 0.1);
  border-radius: 4px;
  margin-bottom: 12px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted-lt);
}

.empty-icon {
  font-size: 56px;
  margin-bottom: 20px;
}

.empty-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 8px;
}

.empty-text {
  font-size: 13px;
  color: var(--muted);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--navy);
  border: 1px solid rgba(43, 168, 224, 0.2);
  border-radius: 16px;
  padding: 40px;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
}

.modal-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 20px;
}

.modal-section {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(43, 168, 224, 0.1);
}

.modal-section:last-child {
  border-bottom: none;
}

.section-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--blue-lt);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.section-value {
  font-size: 13px;
  color: var(--muted-lt);
  line-height: 1.6;
}

.attendee-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.attendee-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: rgba(43, 168, 224, 0.05);
  border-radius: 8px;
  font-size: 12px;
}

.attendee-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-dk), var(--blue));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.attendee-avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.attendee-info {
  flex: 1;
}

.attendee-name {
  font-weight: 700;
  color: #fff;
}

.attendee-joined {
  font-size: 10px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="page">
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>Upcoming Meetups</h1>
        <p>Join fitness activities organized by members like you</p>
      </div>
      <a href="ffp-meetup-create.html" class="btn-create">+ Create Meetup</a>
    </div>

    <div class="meetups-list" id="meetupsList">
      <!-- Loading skeletons -->
      <div class="loading-skeleton">
        <div class="skeleton-line" style="height: 20px; margin-bottom: 16px;"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
      <div class="loading-skeleton">
        <div class="skeleton-line" style="height: 20px; margin-bottom: 16px;"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>
  </div>
</div>

<!-- Meetup Detail Modal -->
<div class="modal" id="meetupModal">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="closeMeetupModal()">✕</button>
  </div>
</div>

<script>
const API_BASE = 'https://FFP-passport-backend.vercel.app';
const memberId = sessionStorage.getItem('member_id') || localStorage.getItem('member_id');

async function loadMeetups() {
  try {
    const response = await fetch(`${API_BASE}/api/meetups?limit=100`);
    const data = await response.json();
    
    if (data.success) {
      renderMeetups(data.meetups);
    } else {
      throw new Error('Failed to load meetups');
    }
  } catch (error) {
    console.error('Error loading meetups:', error);
    document.getElementById('meetupsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load meetups</div>
        <div class="empty-text">${error.message}</div>
      </div>
    `;
  }
}

function renderMeetups(meetups) {
  const list = document.getElementById('meetupsList');
  
  if (!meetups || meetups.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏃</div>
        <div class="empty-title">No meetups yet</div>
        <div class="empty-text">Be the first to <a href="ffp-meetup-create.html" style="color: #2ba8e0; text-decoration: none; font-weight: 700;">create a meetup!</a></div>
      </div>
    `;
    return;
  }

  list.innerHTML = meetups.map(meetup => {
    const dateTime = new Date(meetup.date_time);
    const date = dateTime.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const time = dateTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

    return `
      <div class="meetup-card">
        <div class="meetup-header">
          <div class="meetup-title">${meetup.title}</div>
          <div class="meetup-status">Active</div>
        </div>
        
        ${meetup.creator ? `
          <div class="meetup-creator">
            Organized by <a class="meetup-creator-link" onclick="showMeetupDetail('${meetup.id}')">${meetup.creator.full_name}</a>
          </div>
        ` : ''}

        ${meetup.description ? `
          <div class="meetup-description">${meetup.description}</div>
        ` : ''}

        <div class="meetup-details">
          <div class="meetup-detail">
            <span class="meetup-detail-label">📅 Date</span>
            <span class="meetup-detail-value">${date}</span>
          </div>
          <div class="meetup-detail">
            <span class="meetup-detail-label">🕐 Time</span>
            <span class="meetup-detail-value">${time}</span>
          </div>
          <div class="meetup-detail">
            <span class="meetup-detail-label">📍 Location</span>
            <span class="meetup-detail-value">${meetup.location}</span>
          </div>
          <div class="meetup-detail">
            <span class="meetup-detail-label">👥 Spots</span>
            <span class="meetup-detail-value">${meetup.attendee_count || 0}/${meetup.max_attendees}</span>
          </div>
        </div>

        <div class="meetup-footer">
          <div class="attendees">
            <span class="attendees-strong">${meetup.attendee_count || 0}</span> members joined
          </div>
          <div class="meetup-actions">
            <button class="btn btn-view" onclick="showMeetupDetail('${meetup.id}')">View Details</button>
            <button class="btn btn-join" onclick="joinMeetup('${meetup.id}')">Join</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function showMeetupDetail(meetupId) {
  try {
    const response = await fetch(`${API_BASE}/api/meetups/${meetupId}`);
    const data = await response.json();
    
    if (!data.success) throw new Error('Meetup not found');
    
    const m = data.meetup;
    const dateTime = new Date(m.date_time);
    const date = dateTime.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    const time = dateTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

    const attendeesList = (m.attendees || []).map(a => `
      <div class="attendee-item">
        <div class="attendee-avatar">
          ${a.photo_url ? `<img src="${a.photo_url}" alt="">` : '👤'}
        </div>
        <div class="attendee-info">
          <div class="attendee-name">${a.full_name}</div>
          ${a.interests && a.interests.length ? `
            <div class="attendee-joined">${a.interests.join(', ')}</div>
          ` : ''}
        </div>
      </div>
    `).join('');

    document.getElementById('modalContent').innerHTML = `
      <button class="modal-close" onclick="closeMeetupModal()">✕</button>
      <div class="modal-title">${m.title}</div>

      ${m.description ? `
        <div class="modal-section">
          <div class="section-label">About</div>
          <div class="section-value">${m.description}</div>
        </div>
      ` : ''}

      <div class="modal-section">
        <div class="section-label">When & Where</div>
        <div class="section-value">
          📅 ${date}<br>
          🕐 ${time}<br>
          📍 ${m.location}
        </div>
      </div>

      <div class="modal-section">
        <div class="section-label">Organizer</div>
        <div class="section-value">${m.creator?.full_name || 'Unknown'}</div>
      </div>

      <div class="modal-section">
        <div class="section-label">Attendees (${m.attendees?.length || 0}/${m.max_attendees})</div>
        <div class="attendee-list">
          ${attendeesList || '<div class="section-value">No one has joined yet. Be the first!</div>'}
        </div>
      </div>

      <div style="margin-top: 24px; display: flex; gap: 12px;">
        <button class="btn btn-join" onclick="joinMeetup('${m.id}'); closeMeetupModal();" style="flex: 1;">Join This Meetup</button>
        <button class="btn btn-view" onclick="closeMeetupModal()" style="flex: 1;">Close</button>
      </div>
    `;
    
    document.getElementById('meetupModal').classList.add('active');
  } catch (error) {
    console.error('Error loading meetup:', error);
  }
}

async function joinMeetup(meetupId) {
  if (!memberId) {
    alert('Please sign in first');
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/api/meetups/${meetupId}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ member_id: memberId })
    });

    const data = await response.json();

    if (!response.ok) {
      if (response.status === 409) {
        alert('You\'ve already joined this meetup!');
      } else {
        throw new Error(data.error || 'Failed to join meetup');
      }
      return;
    }

    alert('✅ You\'ve joined the meetup!');
    closeMeetupModal();
    loadMeetups();
  } catch (error) {
    console.error('Error joining meetup:', error);
    alert('Could not join meetup: ' + error.message);
  }
}

function closeMeetupModal() {
  document.getElementById('meetupModal').classList.remove('active');
}

// Load meetups on page load
loadMeetups();
</script>

</body>
</html>
