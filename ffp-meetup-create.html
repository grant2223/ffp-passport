<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Meetup — FFP Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1980AD;
  --blue-lt: #2ba8e0;
  --blue-dk: #0f5a7a;
  --navy: #0b1c28;
  --navy-2: #0d2030;
  --navy-deep: #081420;
  --muted: #6a90a8;
  --muted-lt: #9dbdd0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  background: var(--navy-deep);
  color: #fff;
}

.page { min-height: 100vh; padding: 40px 20px; }

.container {
  max-width: 600px;
  margin: 0 auto;
}

.header {
  margin-bottom: 40px;
}

.header h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
}

.header p {
  color: var(--muted-lt);
  font-size: 14px;
}

.form-group {
  margin-bottom: 24px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--blue-lt);
  margin-bottom: 8px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 14px;
  background: rgba(11, 28, 40, 0.6);
  border: 1px solid rgba(43, 168, 224, 0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--blue-lt);
  background: rgba(11, 28, 40, 0.8);
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.form-group input::placeholder {
  color: rgba(106, 144, 168, 0.5);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-row-full {
  grid-column: 1 / -1;
}

.button-group {
  display: flex;
  gap: 12px;
  margin-top: 32px;
}

.btn {
  flex: 1;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: #fff;
}

.btn-primary:hover {
  transform: translateY(-2px);
}

.btn-secondary {
  background: rgba(43, 168, 224, 0.1);
  border: 1px solid rgba(43, 168, 224, 0.3);
  color: var(--muted-lt);
}

.btn-secondary:hover {
  border-color: var(--blue-lt);
}

.error {
  background: rgba(220, 53, 69, 0.1);
  border: 1px solid rgba(220, 53, 69, 0.3);
  color: #ff6b6b;
  padding: 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 20px;
}

.success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #51cf66;
  padding: 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 20px;
}

.loading { opacity: 0.6; pointer-events: none; }

.info-box {
  background: rgba(43, 168, 224, 0.05);
  border: 1px solid rgba(43, 168, 224, 0.15);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--muted-lt);
  line-height: 1.6;
  margin-bottom: 24px;
}

.info-box strong {
  color: var(--blue-lt);
}
</style>
</head>
<body>

<div class="page">
  <div class="container">
    <div class="header">
      <h1>Create a Meetup</h1>
      <p>Organize a fitness activity and connect with other members</p>
    </div>

    <div class="info-box">
      <strong>💡 Tip:</strong> The more details you provide, the more members will be interested in joining!
    </div>

    <form id="meetupForm">
      <div id="messageBox"></div>

      <!-- Title -->
      <div class="form-group">
        <label>Meetup Title *</label>
        <input type="text" id="title" placeholder="e.g., Morning Yoga Session, Weekend Hike" required>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="Tell members what to expect, what to bring, difficulty level, etc."></textarea>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label>Location *</label>
        <input type="text" id="location" placeholder="e.g., Al Khayma Sports Complex, Hatta Dam" required>
      </div>

      <!-- Date & Time -->
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label>Time *</label>
          <input type="time" id="time" required>
        </div>
      </div>

      <!-- Max Attendees -->
      <div class="form-group">
        <label>Max Attendees</label>
        <input type="number" id="maxAttendees" placeholder="20" value="20" min="2" max="100">
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Create Meetup</button>
      </div>
    </form>
  </div>
</div>

<script>
const API_BASE = 'https://FFP-passport-backend.vercel.app';

// Get member ID from session/storage
const memberId = sessionStorage.getItem('member_id') || localStorage.getItem('member_id');

if (!memberId) {
  document.body.innerHTML = `
    <div style="padding: 40px 20px; text-align: center; color: #fff;">
      <p>Please sign in first.</p>
      <a href="/login.html" style="color: #2ba8e0; text-decoration: none;">← Back to Login</a>
    </div>
  `;
} else {
  document.getElementById('meetupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const title = document.getElementById('title').value.trim();
    const location = document.getElementById('location').value.trim();
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const description = document.getElementById('description').value || null;
    const maxAttendees = parseInt(document.getElementById('maxAttendees').value) || 20;

    if (!title || !location || !date || !time) {
      showMessage('Please fill in all required fields', 'error');
      return;
    }

    // Combine date and time into ISO format
    const dateTime = new Date(`${date}T${time}:00Z`).toISOString();

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.classList.add('loading');
    submitBtn.textContent = 'Creating...';

    try {
      const response = await fetch(`${API_BASE}/api/meetups`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          creator_id: memberId,
          title,
          description,
          location,
          date_time: dateTime,
          max_attendees: maxAttendees
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Failed to create meetup');
      }

      showMessage('Meetup created! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'ffp-meetup-browse.html';
      }, 1500);

    } catch (error) {
      console.error('Meetup creation error:', error);
      showMessage(error.message, 'error');
      submitBtn.classList.remove('loading');
      submitBtn.textContent = 'Create Meetup';
    }
  });
}

function showMessage(msg, type) {
  const box = document.getElementById('messageBox');
  box.className = type;
  box.textContent = msg;
}
</script>

</body>
</html>
