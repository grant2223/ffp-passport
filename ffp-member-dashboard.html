<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFP Passport — Member Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ffp-blue: #2ba8e0;
      --ffp-blue-dark: #1980AD;
      --ffp-navy-deep: #081420;
      --ffp-navy-card: #0f1e2e;
      --ffp-text: #e8eef4;
      --ffp-text-muted: #8a99a8;
      --ffp-yellow: #FFCC00;
      --ffp-border: rgba(43, 168, 224, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--ffp-navy-deep);
      color: var(--ffp-text);
    }

    .dashboard {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* TOP NAV */
    .top-nav {
      background: rgba(11, 28, 40, 0.95);
      border-bottom: 1px solid var(--ffp-border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      height: 56px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-title {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .member-info {
      font-size: 12px;
      text-align: right;
    }

    .member-name {
      font-weight: 700;
      color: var(--ffp-text);
    }

    .member-sub {
      font-size: 10px;
      color: var(--ffp-text-muted);
      font-weight: 500;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--ffp-blue-dark), var(--ffp-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 70px;
    }

    /* PANEL CONTAINER */
    .panel-container {
      min-height: 100%;
    }

    .panel {
      display: none;
      min-height: 100%;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel-loading {
      padding: 40px 20px;
      text-align: center;
      color: var(--ffp-text-muted);
      font-size: 13px;
    }

    .panel-error {
      padding: 40px 20px;
      text-align: center;
      color: #ef4444;
      font-size: 13px;
      font-weight: 700;
    }

    /* BOTTOM TAB NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8, 20, 32, 0.98);
      border-top: 1px solid var(--ffp-border);
      z-index: 100;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--ffp-text-muted);
      font-family: 'Montserrat', system-ui, sans-serif;
      font-size: 9px;
      font-weight: 700;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-item:hover {
      color: var(--ffp-text);
    }

    .nav-item.active {
      color: var(--ffp-yellow);
      border-top: 3px solid var(--ffp-yellow);
    }

    .nav-icon {
      font-size: 18px;
      margin-bottom: 4px;
    }

    /* ERROR STATE */
    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .error-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .error-msg {
      font-size: 13px;
      color: var(--ffp-text-muted);
      margin-bottom: 24px;
      max-width: 300px;
    }

    .error-btn {
      padding: 12px 20px;
      background: var(--ffp-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .error-btn:hover {
      background: var(--ffp-blue-dark);
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .nav-right {
        gap: 6px;
      }

      .member-info {
        display: none;
      }

      .nav-item {
        padding: 8px 6px;
        font-size: 8px;
      }

      .nav-icon {
        font-size: 16px;
        margin-bottom: 3px;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard" id="dashboard">
    <!-- TOP NAVIGATION -->
    <div class="top-nav">
      <div class="nav-left">
        <div class="nav-title">FFP PASSPORT</div>
      </div>
      <div class="nav-right">
        <div class="member-info">
          <div class="member-name" id="member-name">Loading...</div>
          <div class="member-sub" id="member-sub">Member</div>
        </div>
        <div class="avatar" id="member-avatar">GH</div>
      </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="main-content" id="main-content">
      <div class="panel-container">
        <div class="panel active" id="panel-passport">
          <div class="panel-loading">Loading Passport...</div>
        </div>
        <div class="panel" id="panel-deals">
          <div class="panel-loading">Loading Deals...</div>
        </div>
        <div class="panel" id="panel-events">
          <div class="panel-loading">Loading Events...</div>
        </div>
        <div class="panel" id="panel-experiences">
          <div class="panel-loading">Loading Experiences...</div>
        </div>
        <div class="panel" id="panel-challenges">
          <div class="panel-loading">Loading Challenges...</div>
        </div>
        <div class="panel" id="panel-meetmove">
          <div class="panel-loading">Loading Meet & Move...</div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
      <button class="nav-item active" data-panel="passport">
        <div class="nav-icon">📘</div>
        <div>Passport</div>
      </button>
      <button class="nav-item" data-panel="deals">
        <div class="nav-icon">🎁</div>
        <div>Deals</div>
      </button>
      <button class="nav-item" data-panel="events">
        <div class="nav-icon">🎯</div>
        <div>Events</div>
      </button>
      <button class="nav-item" data-panel="experiences">
        <div class="nav-icon">✈️</div>
        <div>Experiences</div>
      </button>
      <button class="nav-item" data-panel="challenges">
        <div class="nav-icon">🏆</div>
        <div>Challenges</div>
      </button>
      <button class="nav-item" data-panel="meetmove">
        <div class="nav-icon">👥</div>
        <div>Meet & Move</div>
      </button>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════════
    // CONFIG & STATE
    // ════════════════════════════════════════════════════════════

    const API_BASE = 'https://ffp-passport-backend.vercel.app';
    const PANELS_BASE = 'https://ffppassport.com/panels';

    let currentMember = null;
    let loadedPanels = new Set();

    // ════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════════════════════

    document.addEventListener('DOMContentLoaded', async function() {
      try {
        // Get member ID from URL
        const memberId = new URLSearchParams(window.location.search).get('id');
        
        if (!memberId) {
          showError('Missing member ID. Please log in again.');
          setTimeout(() => window.location.href = 'login.html', 2000);
          return;
        }

        // Load member data
        await loadMemberData(memberId);

        // Set up navigation
        setupNavigation();

        // Load first panel
        await loadPanel('passport');

      } catch (error) {
        console.error('Dashboard init error:', error);
        showError('Failed to load dashboard. ' + error.message);
      }
    });

    // ════════════════════════════════════════════════════════════
    // LOAD MEMBER DATA
    // ════════════════════════════════════════════════════════════

    async function loadMemberData(memberId) {
      try {
        const response = await fetch(`${API_BASE}/api/members/${memberId}`);
        
        if (!response.ok) {
          throw new Error('Failed to fetch member data');
        }

        const data = await response.json();
        currentMember = data.member;

        // Update UI with member data
        updateMemberUI();

      } catch (error) {
        console.error('Member data error:', error);
        throw error;
      }
    }

    function updateMemberUI() {
      if (!currentMember) return;

      const initials = (currentMember.full_name || 'GH')
        .split(' ')
        .map(n => n[0])
        .join('')
        .toUpperCase()
        .slice(0, 2);

      document.getElementById('member-name').textContent = currentMember.full_name || 'Member';
      document.getElementById('member-sub').textContent = currentMember.passport_no || 'Passport Member';
      document.getElementById('member-avatar').textContent = initials;
    }

    // ════════════════════════════════════════════════════════════
    // LOAD PANEL
    // ════════════════════════════════════════════════════════════

    async function loadPanel(panelName) {
      const panelEl = document.getElementById(`panel-${panelName}`);
      
      if (!panelEl) return;

      // If already loaded, just show it
      if (loadedPanels.has(panelName)) {
        showPanel(panelName);
        return;
      }

      // Show loading
      panelEl.innerHTML = '<div class="panel-loading">Loading...</div>';

      try {
        // Fetch panel HTML
        const url = `${PANELS_BASE}/panel-${panelName}.html`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        let html = await response.text();

        // Extract content from body
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const mainEl = doc.querySelector('main');
        let content = mainEl ? mainEl.innerHTML : html;

        // Remove scripts (security)
        content = content.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');

        // Inject into panel
        panelEl.innerHTML = content;
        loadedPanels.add(panelName);

        // Run panel setup if exists (panels might have initialization scripts)
        const setupFunc = window[`setup${panelName.charAt(0).toUpperCase() + panelName.slice(1)}`];
        if (typeof setupFunc === 'function') {
          setupFunc(currentMember);
        }

      } catch (error) {
        console.error(`Panel load error (${panelName}):`, error);
        panelEl.innerHTML = `<div class="panel-error">Error loading panel. Try again.</div>`;
      }

      showPanel(panelName);
    }

    // ════════════════════════════════════════════════════════════
    // SHOW/HIDE PANELS
    // ════════════════════════════════════════════════════════════

    function showPanel(panelName) {
      // Hide all panels
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      
      // Show selected panel
      const panel = document.getElementById(`panel-${panelName}`);
      if (panel) {
        panel.classList.add('active');
      }

      // Update nav
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      const navItem = document.querySelector(`[data-panel="${panelName}"]`);
      if (navItem) {
        navItem.classList.add('active');
      }

      // Scroll to top
      document.getElementById('main-content').scrollTop = 0;
    }

    // ════════════════════════════════════════════════════════════
    // NAVIGATION SETUP
    // ════════════════════════════════════════════════════════════

    function setupNavigation() {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', async function() {
          const panelName = this.dataset.panel;
          await loadPanel(panelName);
        });
      });
    }

    // ════════════════════════════════════════════════════════════
    // ERROR HANDLING
    // ════════════════════════════════════════════════════════════

    function showError(message) {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = `
        <div class="error-screen">
          <div class="error-title">Oops</div>
          <div class="error-msg">${message}</div>
          <button class="error-btn" onclick="window.location.href='login.html'">Back to Login</button>
        </div>
      `;
    }
  </script>
</body>
</html>
