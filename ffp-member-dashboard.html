<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFP Passport — Member Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1980AD;
      --blue-lt: #2ba8e0;
      --blue-dk: #0f5a7a;
      --navy: #0b1c28;
      --navy-2: #0d2030;
      --navy-card: #0f1e2e;
      --navy-deep: #081420;
      --amber: #FFCC00;
      --amber-dk: #cc9900;
      --green: #22c55e;
      --muted: #6a90a8;
      --muted-lt: #9dbdd0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Montserrat', sans-serif; background: var(--navy-deep); color: #fff; }

    .app { display: flex; height: 100dvh; overflow: hidden; flex-direction: column; }

    .topbar {
      background: rgba(11, 28, 40, 0.95);
      border-bottom: 1px solid rgba(25, 128, 173, 0.1);
      padding: 0 16px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .tb-left { display: flex; align-items: center; gap: 12px; }
    .tb-title { font-size: 15px; font-weight: 900; }
    .tb-right { display: flex; align-items: center; gap: 10px; }

    .tb-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(25, 128, 173, 0.1);
      border: 1px solid rgba(25, 128, 173, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      color: currentColor;
    }

    .tb-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--amber);
      color: #000;
      font-size: 8px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 80px;
      display: flex;
      flex-direction: column;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .mobile-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--navy);
      border-top: 1px solid rgba(25, 128, 173, 0.15);
      z-index: 100;
      padding: 6px 0;
      display: flex;
    }

    .mob-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 0;
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      transition: color 0.2s;
      border-top: 2px solid transparent;
    }

    .mob-item svg {
      color: currentColor;
      flex-shrink: 0;
    }

    .mob-item.active {
      color: var(--blue-lt);
      border-top-color: var(--blue-lt);
    }

    .avatar-menu { position: relative; }

    .avatar-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-dk), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      border: 2px solid rgba(43, 168, 224, 0.3);
    }

    .menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--navy-card);
      border: 1px solid rgba(25, 128, 173, 0.2);
      border-radius: 12px;
      width: 320px;
      max-height: 70vh;
      overflow-y: auto;
      display: none;
      z-index: 1000;
      margin-top: 8px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    .menu-dropdown.active { display: block; }

    #menu-content { min-height: 100px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-title" id="page-title">My Passport</div>
      </div>
      <div class="tb-right">
        <div class="tb-icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <div class="tb-badge">3</div>
        </div>
        <div class="avatar-menu">
          <div class="avatar-btn" onclick="toggleMenu(event)">GH</div>
          <div class="menu-dropdown" id="menu-dropdown">
            <div id="menu-content"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div id="passport" class="panel active"></div>
      <div id="deals" class="panel"></div>
      <div id="events" class="panel"></div>
      <div id="experiences" class="panel"></div>
      <div id="challenges" class="panel"></div>
      <div id="meetmove" class="panel"></div>
    </div>

    <div class="mobile-nav">
      <div class="mob-item active" onclick="switchPanel('passport')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 4a2 2 0 0 1 2 2v2H6V6a2 2 0 0 1 2-2h8z"></path></svg><span>Passport</span></div>
      <div class="mob-item" onclick="switchPanel('deals')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 1 22 8 22 16 12 23 2 16 2 8 12 1"></polyline><polyline points="12 12.5 22 8 12 3.5 2 8 12 12.5"></polyline><polyline points="12 12.5 12 23"></polyline><polyline points="12 12.5 22 8"></polyline><polyline points="12 12.5 2 8"></polyline></svg><span>Deals</span></div>
      <div class="mob-item" onclick="switchPanel('events')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span>Events</span></div>
      <div class="mob-item" onclick="switchPanel('experiences')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span>Experiences</span></div>
      <div class="mob-item" onclick="switchPanel('challenges')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9c0-1 1-2 2-2h8c1 0 2 1 2 2v8c0 1-1 2-2 2H8c-1 0-2-1-2-2V9z"></path><path d="M9 9v-1h6v1"></path><path d="M9 17v1h6v-1"></path><line x1="6" y1="13" x2="6" y2="13.01"></line><line x1="18" y1="13" x2="18" y2="13.01"></line></svg><span>Challenges</span></div>
      <div class="mob-item" onclick="switchPanel('meetmove')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Meet & Move</span></div>
    </div>
  </div>

  <script>
    const memberData = { id: 'demo-001', name: 'Grant Hermanus', tier: 'premium', country: 'UNITED ARAB EMIRATES' };

    window.addEventListener('load', () => loadPanel('passport'));

    function switchPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.mob-item').forEach(m => m.classList.remove('active'));
      const panel = document.getElementById(name);
      panel.classList.add('active');
      event?.target?.closest('.mob-item')?.classList.add('active');
      const titles = { passport: 'My Passport', deals: 'Deals', events: 'Events', experiences: 'Experiences', challenges: 'Challenges', meetmove: 'Meet & Move' };
      document.getElementById('page-title').textContent = titles[name];
      if (panel.innerHTML.trim() === '') loadPanel(name);
    }

    function loadPanel(name) {
      const panel = document.getElementById(name);
      if (!panel) return;
      const panelFiles = { passport: 'panel-passport.html', deals: 'panel-deals.html', events: 'panel-events.html', experiences: 'panel-experiences.html', challenges: 'panel-challenges.html', meetmove: 'panel-meetmove.html' };
      const url = `https://ffppassport.com/panels/${panelFiles[name]}`;
      
      fetch(url)
        .then(r => r.text())
        .then(html => {
          const temp = document.createElement('div');
          temp.innerHTML = html;
          const body = temp.querySelector('body');
          let content = body?.innerHTML || html;
          content = content.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');
          panel.innerHTML = content;
        })
        .catch(err => {
          panel.innerHTML = `<p style="padding:20px;color:#ff6b6b;">Error loading panel</p>`;
        });
    }

    // ====================================================================
    // USER MENU SYSTEM — Load menu modules dynamically
    // ====================================================================
    
    const menuModules = {
      profile: 'https://ffppassport.com/user-menu/menu-profile.js',
      fitness: 'https://ffppassport.com/user-menu/menu-fitness-stats.js',
      calories: 'https://ffppassport.com/user-menu/menu-calorie-tracker.js',
      workout: 'https://ffppassport.com/user-menu/menu-workout-timer.js',
      earnings: 'https://ffppassport.com/user-menu/menu-earnings.js'
    };

    let currentMenuModule = null;
    const menuLabels = {
      profile: 'My Profile',
      fitness: 'Fitness Stats',
      calories: 'Calorie Tracker',
      workout: 'Workout Timer',
      earnings: 'My Earnings'
    };

    // Load and initialize a menu module
    async function loadMenuModule(moduleKey) {
      try {
        const script = document.createElement('script');
        script.src = menuModules[moduleKey];
        script.onload = () => {
          // Module loaded, it will auto-init and render into #menu-content
          currentMenuModule = moduleKey;
        };
        script.onerror = () => {
          document.getElementById('menu-content').innerHTML = `<p style="padding:16px;color:#ff6b6b;font-size:12px;">Failed to load menu</p>`;
        };
        document.head.appendChild(script);
      } catch (err) {
        console.error('Menu load error:', err);
      }
    }

    // Build menu navigation
    function buildMenuNav() {
      const container = document.getElementById('menu-content');
      const nav = document.createElement('div');
      nav.style.cssText = 'display: flex; flex-direction: column; gap: 6px; padding: 8px;';
      
      Object.entries(menuLabels).forEach(([key, label]) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.style.cssText = `
          background: rgba(25, 128, 173, 0.1);
          border: 1px solid rgba(25, 128, 173, 0.2);
          border-radius: 8px;
          color: var(--muted);
          padding: 10px 12px;
          font-size: 12px;
          font-weight: 700;
          cursor: pointer;
          font-family: 'Montserrat', sans-serif;
          transition: all 0.2s;
        `;
        btn.onmouseover = () => {
          btn.style.borderColor = 'var(--blue-lt)';
          btn.style.color = 'var(--blue-lt)';
        };
        btn.onmouseout = () => {
          btn.style.borderColor = 'rgba(25, 128, 173, 0.2)';
          btn.style.color = 'var(--muted)';
        };
        btn.onclick = () => {
          container.innerHTML = ''; // Clear
          loadMenuModule(key);
        };
        nav.appendChild(btn);
      });
      
      container.appendChild(nav);
    }

    function toggleMenu(e) {
      e.stopPropagation();
      const dropdown = document.getElementById('menu-dropdown');
      
      // If menu not open, build nav on first open
      if (!dropdown.classList.contains('active') && !currentMenuModule) {
        buildMenuNav();
      }
      
      dropdown.classList.toggle('active');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.avatar-menu')) {
        document.getElementById('menu-dropdown').classList.remove('active');
      }
    });
  </script>
</body>
</html>
