<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFP Passport — Member Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1980AD;
      --blue-lt: #2ba8e0;
      --blue-dk: #0f5a7a;
      --navy: #0b1c28;
      --navy-2: #0d2030;
      --navy-card: #0f1e2e;
      --navy-deep: #081420;
      --amber: #FFCC00;
      --amber-dk: #cc9900;
      --green: #22c55e;
      --muted: #6a90a8;
      --muted-lt: #9dbdd0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Montserrat', sans-serif; background: var(--navy-deep); color: #fff; }

    .app { display: flex; height: 100dvh; overflow: hidden; flex-direction: column; }

    .topbar {
      background: rgba(11, 28, 40, 0.95);
      border-bottom: 1px solid rgba(25, 128, 173, 0.1);
      padding: 0 16px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .tb-left { display: flex; align-items: center; gap: 12px; }
    .tb-title { font-size: 15px; font-weight: 900; }
    .tb-right { display: flex; align-items: center; gap: 10px; }

    .tb-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(25, 128, 173, 0.1);
      border: 1px solid rgba(25, 128, 173, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      color: currentColor;
    }

    .tb-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--amber);
      color: #000;
      font-size: 8px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 80px;
      display: flex;
      flex-direction: column;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* MOBILE NAV — BOTTOM */
    .mobile-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--navy);
      border-top: 1px solid rgba(25, 128, 173, 0.15);
      z-index: 100;
      padding: 6px 0;
      display: flex;
    }

    .mob-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 0;
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      transition: color 0.2s;
      border-top: 2px solid transparent;
    }

    .mob-item svg {
      color: currentColor;
      flex-shrink: 0;
    }

    .mob-item.active {
      color: var(--blue-lt);
      border-top-color: var(--blue-lt);
    }

    /* AVATAR DROPDOWN MENU */
    .avatar-menu { position: relative; }

    .avatar-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-dk), var(--blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      border: 2px solid rgba(43, 168, 224, 0.3);
    }

    .menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--navy-card);
      border: 1px solid rgba(25, 128, 173, 0.2);
      border-radius: 12px;
      width: 320px;
      max-height: 70vh;
      overflow-y: auto;
      display: none;
      z-index: 1000;
      margin-top: 8px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    .menu-dropdown.active { display: block; }

    #menu-content { min-height: 100px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-title" id="page-title">My Passport</div>
      </div>
      <div class="tb-right">
        <div class="tb-icon-btn">
          <i data-feather="bell" style="width: 18px; height: 18px;"></i>
          <div class="tb-badge">3</div>
        </div>
        <div class="avatar-menu">
          <div class="avatar-btn" onclick="toggleMenu(event)">GH</div>
          <div class="menu-dropdown" id="menu-dropdown">
            <div id="menu-content"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT — PANELS -->
    <div class="main-content">
      <div id="passport" class="panel active"></div>
      <div id="deals" class="panel"></div>
      <div id="events" class="panel"></div>
      <div id="experiences" class="panel"></div>
      <div id="challenges" class="panel"></div>
      <div id="meetmove" class="panel"></div>
    </div>

    <!-- MOBILE NAV — BOTTOM -->
    <div class="mobile-nav">
      <div class="mob-item active" onclick="switchPanel('passport')">
        <i data-feather="credit-card" style="width: 20px; height: 20px;"></i>
        <span>Passport</span>
      </div>
      <div class="mob-item" onclick="switchPanel('deals')">
        <i data-feather="gift" style="width: 20px; height: 20px;"></i>
        <span>Deals</span>
      </div>
      <div class="mob-item" onclick="switchPanel('events')">
        <i data-feather="calendar" style="width: 20px; height: 20px;"></i>
        <span>Events</span>
      </div>
      <div class="mob-item" onclick="switchPanel('experiences')">
        <i data-feather="map" style="width: 20px; height: 20px;"></i>
        <span>Experiences</span>
      </div>
      <div class="mob-item" onclick="switchPanel('challenges')">
        <i data-feather="award" style="width: 20px; height: 20px;"></i>
        <span>Challenges</span>
      </div>
      <div class="mob-item" onclick="switchPanel('meetmove')">
        <i data-feather="users" style="width: 20px; height: 20px;"></i>
        <span>Meet & Move</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script>
    feather.replace();
    
    // Load passport panel on page load
    window.addEventListener('load', () => {
      loadPanel('passport');
    });
    
    function switchPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.mob-item').forEach(m => m.classList.remove('active'));
      
      const panel = document.getElementById(name);
      panel.classList.add('active');
      event?.target?.closest('.mob-item')?.classList.add('active');
      
      const titles = { 
        passport: 'My Passport', 
        deals: 'Deals', 
        events: 'Events', 
        experiences: 'Experiences', 
        challenges: 'Challenges', 
        meetmove: 'Meet & Move' 
      };
      document.getElementById('page-title').textContent = titles[name];
      
      // Load panel content if empty
      if (panel.innerHTML.trim() === '') {
        loadPanel(name);
      }
    }

    function loadPanel(name) {
      const panel = document.getElementById(name);
      panel.innerHTML = '<p style="padding: 20px; color: var(--muted); text-align: center;">Loading...</p>';
      
      // Map panel names to file names
      const panelFiles = {
        passport: 'panel-passport.html',
        deals: 'panel-deals.html',
        events: 'panel-events.html',
        experiences: 'panel-experiences.html',
        challenges: 'panel-challenges.html',
        meetmove: 'panel-meetmove.html'
      };
      
      const fileName = panelFiles[name];
      const url = `https://ffppassport.com/panels/${fileName}`;
      
      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          return response.text();
        })
        .then(html => {
          panel.innerHTML = html;
        })
        .catch(error => {
          panel.innerHTML = `<p style="padding: 20px; color: #ff6b6b; text-align: center;">Error loading ${name}.<br/>Details: ${error.message}</p>`;
          console.error(`Failed to load panel ${fileName}:`, error);
        });
    }

    function toggleMenu(e) {
      e.stopPropagation();
      const dropdown = document.getElementById('menu-dropdown');
      dropdown.classList.toggle('active');
      
      if (dropdown.classList.contains('active')) {
        loadUserMenu();
      }
    }

    function loadUserMenu() {
      const content = document.getElementById('menu-content');
      
      content.innerHTML = `
        <div style="padding: 16px; text-align: center; color: var(--muted);">
          <p style="font-size: 11px; margin-bottom: 12px;">Loading menu...</p>
        </div>
      `;

      const menuFiles = [
        'menu-workout-timer.js',
        'menu-calorie-tracker.js',
        'menu-fitness-stats.js',
        'menu-earnings.js',
        'menu-profile.js'
      ];

      menuFiles.forEach(file => {
        const script = document.createElement('script');
        script.src = '/user-menu/' + file;
        script.onerror = () => {
          console.log(file + ' not found or not loaded yet');
        };
        document.head.appendChild(script);
      });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.avatar-menu')) {
        document.getElementById('menu-dropdown').classList.remove('active');
      }
    });
  </script>
</body>
</html>
