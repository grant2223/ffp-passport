<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFP Passport — Member Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1980AD;
      --blue-lt: #2ba8e0;
      --blue-dk: #0f5a7a;
      --navy: #0b1c28;
      --navy-2: #0d2030;
      --navy-card: #0f1e2e;
      --navy-deep: #081420;
      --amber: #FFCC00;
      --amber-dk: #cc9900;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.1);
      --green-bd: rgba(34, 197, 94, 0.28);
      --muted: #6a90a8;
      --muted-lt: #9dbdd0;
      --sidebar: 230px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: var(--navy-deep);
      color: #fff;
    }

    .app {
      display: flex;
      height: 100dvh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--navy);
      border-right: 1px solid rgba(25, 128, 173, 0.15);
      display: flex;
      flex-direction: column;
    }

    .sb-logo {
      padding: 22px 20px 16px;
      border-bottom: 1px solid rgba(25, 128, 173, 0.1);
    }

    .sb-brand {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .sb-brand span {
      color: var(--blue);
    }

    .sb-nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
    }

    .ni {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .ni:hover {
      background: rgba(25, 128, 173, 0.08);
      color: #fff;
    }

    .ni.active {
      background: rgba(25, 128, 173, 0.15);
      color: #fff;
      border-color: rgba(25, 128, 173, 0.22);
    }

    .sb-profile {
      padding: 14px 16px;
      border-top: 1px solid rgba(25, 128, 173, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .pname {
      font-size: 12px;
      font-weight: 700;
    }

    .psub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* MAIN */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: var(--navy-deep);
    }

    .topbar {
      background: rgba(11, 28, 40, 0.95);
      border-bottom: 1px solid rgba(25, 128, 173, 0.1);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tb-title {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.2px;
    }

    /* PANELS */
    .panels-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 28px 0;
      border-bottom: 1px solid rgba(25, 128, 173, 0.1);
      overflow-x: auto;
    }

    .panel-tab {
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .panel-tab:hover {
      color: #fff;
    }

    .panel-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px 200px;
      display: none;
    }

    .panel-content.active {
      display: block;
    }

    /* MENU DROPDOWN */
    .avatar-menu {
      position: relative;
    }

    .menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--navy-card);
      border: 1px solid rgba(25, 128, 173, 0.2);
      border-radius: 12px;
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      display: none;
      z-index: 1000;
      margin-top: 8px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    .menu-dropdown.active {
      display: block;
    }

    #menu-content {
      /* Populated by user menu JS files */
    }

    /* MOBILE */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--navy);
      border-top: 1px solid rgba(25, 128, 173, 0.15);
      z-index: 100;
      padding: 6px 0;
    }

    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }

      .mobile-nav {
        display: flex;
      }

      .panel-tabs {
        padding: 16px 16px 0;
      }

      .panel-content {
        padding: 16px;
      }
    }

    /* UTILITY */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }

    .btn-blue {
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff;
      box-shadow: 0 4px 16px rgba(25, 128, 173, 0.3);
    }

    .btn-blue:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(25, 128, 173, 0.4);
    }

    .btn-amber {
      background: linear-gradient(135deg, var(--amber-dk), var(--amber));
      color: #000;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(25, 128, 173, 0.3);
      color: var(--muted-lt);
    }

    .btn-outline:hover {
      border-color: var(--blue);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-logo">
        <div class="sb-brand">FFP <span>Passport</span></div>
      </div>

      <div class="sb-nav">
        <div class="ni active" onclick="switchPanel('passport')">
          📋 Passport
        </div>
        <div class="ni" onclick="switchPanel('deals')">
          🤝 Deals
        </div>
        <div class="ni" onclick="switchPanel('events')">
          📅 Events
        </div>
        <div class="ni" onclick="switchPanel('experiences')">
          ✈️ Experiences
        </div>
        <div class="ni" onclick="switchPanel('challenges')">
          🏆 Challenges
        </div>
        <div class="ni" onclick="switchPanel('meetmove')">
          👥 Meet & Move
        </div>
      </div>

      <div class="sb-profile" onclick="toggleMenu()">
        <div class="av">GH</div>
        <div>
          <div class="pname">Grant</div>
          <div class="psub">Member</div>
        </div>
      </div>

      <!-- AVATAR MENU DROPDOWN -->
      <div class="avatar-menu" style="padding: 0 10px 10px;">
        <div class="menu-dropdown" id="menu-dropdown">
          <div id="menu-content"></div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <div class="topbar">
        <div class="tb-title" id="panel-title">My Passport</div>
        <div></div>
      </div>

      <div class="panels-container">
        <!-- PANEL TABS -->
        <div class="panel-tabs">
          <button class="panel-tab active" onclick="switchPanel('passport')">Passport</button>
          <button class="panel-tab" onclick="switchPanel('deals')">Deals</button>
          <button class="panel-tab" onclick="switchPanel('events')">Events</button>
          <button class="panel-tab" onclick="switchPanel('experiences')">Experiences</button>
          <button class="panel-tab" onclick="switchPanel('challenges')">Challenges</button>
          <button class="panel-tab" onclick="switchPanel('meetmove')">Meet & Move</button>
        </div>

        <!-- PANEL CONTENT -->
        <div id="passport" class="panel-content active"></div>
        <div id="deals" class="panel-content"></div>
        <div id="events" class="panel-content"></div>
        <div id="experiences" class="panel-content"></div>
        <div id="challenges" class="panel-content"></div>
        <div id="meetmove" class="panel-content"></div>
      </div>
    </div>
  </div>

  <script>
    // Panel switching
    function switchPanel(panelName) {
      // Hide all panels
      document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));

      // Show selected panel
      document.getElementById(panelName).classList.add('active');
      document.querySelector(`[onclick="switchPanel('${panelName}')"]`).classList.add('active');
      event?.target?.classList.add('active');

      // Update title
      const titles = {
        passport: 'My Passport',
        deals: 'Deals',
        events: 'Events',
        experiences: 'Experiences',
        challenges: 'Challenges',
        meetmove: 'Meet & Move'
      };
      document.getElementById('panel-title').textContent = titles[panelName] || 'Dashboard';

      // Load panel content (placeholder for now)
      loadPanel(panelName);
    }

    function loadPanel(panelName) {
      const panel = document.getElementById(panelName);
      panel.innerHTML = `<p style="padding: 20px; color: var(--muted);">Loading ${panelName}...</p>`;
      // Panel content will be loaded from your existing panel files
    }

    // Avatar menu dropdown
    function toggleMenu() {
      const dropdown = document.getElementById('menu-dropdown');
      dropdown.classList.toggle('active');
      
      // Load user menu content
      if (dropdown.classList.contains('active')) {
        loadUserMenu();
      }
    }

    function loadUserMenu() {
      const content = document.getElementById('menu-content');
      
      // Placeholder menu options
      const menuOptions = [
        { name: 'Workout Timer', id: 'workout-timer' },
        { name: 'Calorie Tracker', id: 'calorie-tracker' },
        { name: 'Fitness Stats', id: 'fitness-stats' },
        { name: 'My Earnings', id: 'earnings' },
        { name: 'My Profile', id: 'profile' }
      ];

      content.innerHTML = `
        <div style="padding: 16px; text-align: center; color: var(--muted);">
          Menu system ready. User menu files loaded.
        </div>
      `;
    }

    // Close menu when clicking elsewhere
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.avatar-menu') && !e.target.closest('.sb-profile')) {
        document.getElementById('menu-dropdown').classList.remove('active');
      }
    });
  </script>
</body>
</html>
