<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover Members — FFP Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1980AD;
  --blue-lt: #2ba8e0;
  --blue-dk: #0f5a7a;
  --navy: #0b1c28;
  --navy-2: #0d2030;
  --navy-card: #0f1e2e;
  --navy-deep: #081420;
  --amber: #FFCC00;
  --green: #22c55e;
  --muted: #6a90a8;
  --muted-lt: #9dbdd0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  background: var(--navy-deep);
  color: #fff;
}

.page { min-height: 100vh; padding: 40px 20px; }

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.header {
  margin-bottom: 40px;
}

.header h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
}

.header p {
  color: var(--muted-lt);
  font-size: 14px;
}

/* Search & Filter */
.search-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 200px;
  padding: 12px 16px;
  background: rgba(11, 28, 40, 0.6);
  border: 1px solid rgba(43, 168, 224, 0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
}

.search-input::placeholder {
  color: rgba(106, 144, 168, 0.5);
}

.filter-btn {
  padding: 10px 16px;
  background: rgba(43, 168, 224, 0.1);
  border: 1px solid rgba(43, 168, 224, 0.2);
  border-radius: 8px;
  color: var(--muted-lt);
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
}

.filter-btn.active {
  background: var(--blue-lt);
  color: #000;
  border-color: var(--blue-lt);
}

/* Members Grid */
.members-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
}

.member-card {
  background: var(--navy-card);
  border: 1px solid rgba(43, 168, 224, 0.12);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s;
}

.member-card:hover {
  border-color: var(--blue-lt);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(43, 168, 224, 0.2);
}

.member-photo {
  width: 100%;
  height: 200px;
  background: linear-gradient(135deg, var(--blue-dk), var(--blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  overflow: hidden;
}

.member-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.member-info {
  padding: 20px;
}

.member-name {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 4px;
}

.member-tier {
  display: inline-block;
  background: rgba(255, 204, 0, 0.1);
  border: 1px solid rgba(255, 204, 0, 0.3);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 8px;
  font-weight: 800;
  color: var(--amber);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.member-tier.ambassador {
  background: rgba(34, 197, 94, 0.1);
  border-color: rgba(34, 197, 94, 0.3);
  color: var(--green);
}

.member-fitness {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.member-bio {
  font-size: 12px;
  color: var(--muted-lt);
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.member-interests {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.interest-tag {
  background: rgba(43, 168, 224, 0.1);
  border: 1px solid rgba(43, 168, 224, 0.2);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 9px;
  color: var(--blue-lt);
}

.member-stats {
  display: flex;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid rgba(43, 168, 224, 0.1);
  font-size: 11px;
}

.stat {
  text-align: center;
  flex: 1;
}

.stat-value {
  font-weight: 900;
  color: var(--blue-lt);
  display: block;
}

.stat-label {
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Loading */
.loading-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.skeleton {
  background: var(--navy-card);
  border: 1px solid rgba(43, 168, 224, 0.12);
  border-radius: 16px;
  overflow: hidden;
  animation: pulse 2s infinite;
}

.skeleton-photo {
  width: 100%;
  height: 200px;
  background: rgba(43, 168, 224, 0.1);
}

.skeleton-info {
  padding: 20px;
}

.skeleton-line {
  height: 12px;
  background: rgba(43, 168, 224, 0.1);
  border-radius: 4px;
  margin-bottom: 12px;
}

.skeleton-line:last-child {
  margin-bottom: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted-lt);
}

.empty-icon {
  font-size: 64px;
  margin-bottom: 20px;
}

.empty-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 8px;
}

.empty-text {
  font-size: 13px;
  color: var(--muted);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--navy);
  border: 1px solid rgba(43, 168, 224, 0.2);
  border-radius: 20px;
  padding: 40px;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
}

.modal-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 20px;
}

.modal-photo {
  width: 100%;
  height: 300px;
  background: linear-gradient(135deg, var(--blue-dk), var(--blue));
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}

.modal-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-stat {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(43, 168, 224, 0.1);
  font-size: 13px;
}

.modal-stat-label { color: var(--muted); }
.modal-stat-value { color: var(--blue-lt); font-weight: 900; }

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 20px;
  width: 100%;
}

.btn:hover {
  transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="page">
  <div class="container">
    <div class="header">
      <h1>Discover Members</h1>
      <p>Find your fit tribe and connect with people who share your interests.</p>
    </div>

    <!-- Search & Filter -->
    <div class="search-bar">
      <input 
        type="text" 
        class="search-input" 
        id="searchInput"
        placeholder="Search by name or interests..."
      >
      <button class="filter-btn" data-filter="all">All</button>
      <button class="filter-btn active" data-filter="beginner">🟢 Beginner</button>
      <button class="filter-btn" data-filter="intermediate">🔵 Intermediate</button>
      <button class="filter-btn" data-filter="advanced">🔴 Advanced</button>
    </div>

    <!-- Members Grid -->
    <div class="members-grid" id="membersGrid">
      <!-- Loading skeletons -->
      <div class="skeleton">
        <div class="skeleton-photo"></div>
        <div class="skeleton-info">
          <div class="skeleton-line" style="height: 16px; margin-bottom: 8px;"></div>
          <div class="skeleton-line" style="height: 12px;"></div>
          <div class="skeleton-line" style="height: 12px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Member Detail Modal -->
<div class="modal" id="memberModal">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="closeMemberModal()">✕</button>
  </div>
</div>

<script>
const API_BASE = 'https://FFP-passport-backend.vercel.app';
let allMembers = [];
let selectedFitness = 'all';

// Load members
async function loadMembers() {
  try {
    const response = await fetch(`${API_BASE}/api/members?limit=100`);
    const data = await response.json();
    
    if (data.success) {
      allMembers = data.members || [];
      renderMembers(allMembers);
    }
  } catch (error) {
    console.error('Error loading members:', error);
    document.getElementById('membersGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load members</div>
        <div class="empty-text">${error.message}</div>
      </div>
    `;
  }
}

function renderMembers(members) {
  const grid = document.getElementById('membersGrid');
  
  if (members.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">👥</div>
        <div class="empty-title">No members found</div>
        <div class="empty-text">Try adjusting your search or filters.</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = members.map(member => `
    <div class="member-card" onclick="showMemberDetail('${member.id}')">
      <div class="member-photo">
        ${member.photo_url 
          ? `<img src="${member.photo_url}" alt="${member.full_name}">` 
          : '👤'}
      </div>
      <div class="member-info">
        <div class="member-name">${member.full_name || 'Member'}</div>
        ${member.ambassador_tier 
          ? '<div class="member-tier ambassador">⭐ Ambassador</div>'
          : '<div class="member-tier">Member</div>'}
        ${member.fitness_level 
          ? `<div class="member-fitness">💪 ${member.fitness_level}</div>`
          : ''}
        ${member.bio 
          ? `<div class="member-bio">"${member.bio}"</div>`
          : ''}
        ${member.interests && member.interests.length
          ? `<div class="member-interests">
              ${member.interests.slice(0, 3).map(i => 
                `<span class="interest-tag">${i}</span>`
              ).join('')}
            </div>`
          : ''}
        <div class="member-stats">
          <div class="stat">
            <span class="stat-value">${member.points || 0}</span>
            <span class="stat-label">Points</span>
          </div>
          <div class="stat">
            <span class="stat-value">${member.visit_count || 0}</span>
            <span class="stat-label">Visits</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// Search & Filter
document.getElementById('searchInput').addEventListener('input', filterMembers);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    selectedFitness = e.target.dataset.filter;
    filterMembers();
  });
});

function filterMembers() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = allMembers.filter(m => {
    const nameMatch = m.full_name?.toLowerCase().includes(search);
    const bioMatch = m.bio?.toLowerCase().includes(search);
    const interestMatch = m.interests?.some(i => i.toLowerCase().includes(search));
    const textMatch = nameMatch || bioMatch || interestMatch;
    
    const fitnessMatch = selectedFitness === 'all' || m.fitness_level === selectedFitness;
    
    return textMatch && fitnessMatch;
  });
  
  renderMembers(filtered);
}

// Member detail modal
async function showMemberDetail(memberId) {
  try {
    const response = await fetch(`${API_BASE}/api/members/${memberId}`);
    const data = await response.json();
    
    if (!data.success) throw new Error('Member not found');
    
    const m = data.member;
    document.getElementById('modalContent').innerHTML = `
      <button class="modal-close" onclick="closeMemberModal()">✕</button>
      <div class="modal-photo">
        ${m.photo_url ? `<img src="${m.photo_url}" alt="">` : '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">👤</div>'}
      </div>
      <div class="modal-title">${m.full_name}</div>
      ${m.bio ? `<p style="color: var(--muted-lt); margin-bottom: 20px;">"${m.bio}"</p>` : ''}
      
      <div class="modal-stat">
        <span class="modal-stat-label">Member Since</span>
        <span class="modal-stat-value">${new Date(m.joined_at).toLocaleDateString()}</span>
      </div>
      ${m.fitness_level ? `
        <div class="modal-stat">
          <span class="modal-stat-label">Fitness Level</span>
          <span class="modal-stat-value">${m.fitness_level}</span>
        </div>
      ` : ''}
      <div class="modal-stat">
        <span class="modal-stat-label">Points</span>
        <span class="modal-stat-value">${m.points || 0}</span>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-label">Provider Visits</span>
        <span class="modal-stat-value">${m.visit_count || 0}</span>
      </div>
      ${m.interests && m.interests.length ? `
        <div style="margin-top: 20px;">
          <div style="font-size: 11px; color: var(--blue-lt); font-weight: 800; margin-bottom: 8px;">INTERESTS</div>
          <div class="member-interests">
            ${m.interests.map(i => `<span class="interest-tag">${i}</span>`).join('')}
          </div>
        </div>
      ` : ''}
      <button class="btn" onclick="connectMember('${m.id}')">Connect</button>
    `;
    
    document.getElementById('memberModal').classList.add('active');
  } catch (error) {
    console.error('Error loading member:', error);
  }
}

function closeMemberModal() {
  document.getElementById('memberModal').classList.remove('active');
}

function connectMember(memberId) {
  alert('Coming soon: Direct messaging & connection requests!');
  closeMemberModal();
}

// Load on page load
loadMembers();
</script>

</body>
</html>
