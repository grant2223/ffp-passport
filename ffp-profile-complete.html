<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Your Profile — FFP Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --blue: #1980AD;
  --blue-lt: #2ba8e0;
  --blue-dk: #0f5a7a;
  --navy: #0b1c28;
  --navy-2: #0d2030;
  --navy-deep: #081420;
  --muted: #6a90a8;
  --muted-lt: #9dbdd0;
  --gold: #f4a934;
  --border: rgba(43, 168, 224, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  background: var(--navy-deep);
  color: #fff;
}

.app {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 520px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.header {
  text-align: center;
  margin-bottom: 48px;
}

.logo {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.logo span { color: var(--blue-lt); }

.subtitle {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 24px;
}

.heading {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, var(--blue-lt) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subheading {
  font-size: 13px;
  color: var(--muted-lt);
  line-height: 1.6;
}

/* Form */
.form-group {
  margin-bottom: 28px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--blue-lt);
  margin-bottom: 10px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 16px;
  background: rgba(11, 28, 40, 0.5);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  transition: all 0.2s;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--blue-lt);
  background: rgba(11, 28, 40, 0.8);
  box-shadow: 0 0 12px rgba(43, 168, 224, 0.1);
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.form-group input::placeholder {
  color: rgba(106, 144, 168, 0.4);
}

/* Photo upload */
.photo-upload {
  position: relative;
  width: 100px;
  height: 100px;
  margin: 0 auto 28px;
  cursor: pointer;
}

.photo-preview {
  width: 100%;
  height: 100%;
  border-radius: 14px;
  border: 2px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(43, 168, 224, 0.05);
  font-size: 32px;
  transition: all 0.3s;
  color: var(--blue-lt);
}

.photo-upload:hover .photo-preview {
  border-color: var(--blue-lt);
  background: rgba(43, 168, 224, 0.12);
  transform: scale(1.05);
}

.photo-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

#photoInput { display: none; }

/* Skills Section */
.skills-container {
  margin-bottom: 24px;
}

.skill-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  background: rgba(43, 168, 224, 0.08);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  transition: all 0.2s;
}

.skill-item:hover {
  background: rgba(43, 168, 224, 0.12);
  border-color: rgba(43, 168, 224, 0.25);
}

.skill-name {
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.skill-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(43, 168, 224, 0.2);
  border-radius: 6px;
  color: var(--blue-lt);
  font-size: 12px;
}

.star-rating {
  display: flex;
  gap: 6px;
}

.star {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: #444;
  font-size: 14px;
}

.star:hover,
.star.active {
  color: var(--gold);
  transform: scale(1.15);
}

/* Buttons */
.button-group {
  display: flex;
  gap: 12px;
  margin-top: 40px;
}

.btn {
  flex: 1;
  padding: 14px 24px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.5px;
  transition: all 0.3s;
  text-transform: uppercase;
}

.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: #fff;
  box-shadow: 0 4px 16px rgba(43, 168, 224, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(43, 168, 224, 0.4);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: rgba(43, 168, 224, 0.1);
  border: 1px solid var(--border);
  color: var(--muted-lt);
}

.btn-secondary:hover {
  border-color: var(--blue-lt);
  background: rgba(43, 168, 224, 0.15);
}

/* Messages */
.error {
  background: rgba(220, 53, 69, 0.12);
  border: 1px solid rgba(220, 53, 69, 0.3);
  color: #ff6b6b;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 12px;
  margin-bottom: 20px;
}

.success {
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #51cf66;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 12px;
  margin-bottom: 20px;
}

.loading { opacity: 0.6; pointer-events: none; }

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 32px 24px; }
  .heading { font-size: 24px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="container">
    <div class="header">
      <div class="logo">
        <i class="fas fa-passport"></i>
        FFP <span>PASSPORT</span>
      </div>
      <div class="subtitle">Find Fit People</div>
      <h1 class="heading">Complete Your Profile</h1>
      <p class="subheading">Rate your skills to find your perfect match</p>
    </div>

    <form id="profileForm">
      <div id="messageBox"></div>

      <!-- Photo -->
      <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
        <div class="photo-preview" id="photoPreview">
          <i class="fas fa-camera"></i>
        </div>
        <input type="file" id="photoInput" accept="image/*">
      </div>

      <!-- Name -->
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="Your name" required>
      </div>

      <!-- Date of Birth -->
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dateOfBirth">
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="">Select...</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Bio -->
      <div class="form-group">
        <label>Bio</label>
        <textarea id="bio" placeholder="Tell us about yourself (max 200 chars)"></textarea>
      </div>

      <!-- Skills & Rating -->
      <div class="form-group">
        <label>Sport & Skill Levels (0 = Never done, 5 = Professional)</label>
        <div class="skills-container" id="skillsContainer"></div>
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Back</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Complete Profile</button>
      </div>
    </form>
  </div>
</div>

<script>
const API_BASE = 'https://ffp-passport-backend.vercel.app';

const SPORTS = [
  { name: 'Running', icon: 'fa-person-running', key: 'running' },
  { name: 'Cycling', icon: 'fa-person-biking', key: 'cycling' },
  { name: 'Swimming', icon: 'fa-person-swimming', key: 'swimming' },
  { name: 'Yoga', icon: 'fa-om', key: 'yoga' },
  { name: 'Gym', icon: 'fa-dumbbell', key: 'gym' },
  { name: 'Padel', icon: 'fa-racquet', key: 'padel' },
  { name: 'Hiking', icon: 'fa-person-hiking', key: 'hiking' },
  { name: 'Boxing', icon: 'fa-hand-fist', key: 'boxing' },
  { name: 'CrossFit', icon: 'fa-fire', key: 'crossfit' },
];

const memberId = new URLSearchParams(window.location.search).get('id') || 
                 sessionStorage.getItem('member_id');

if (!memberId) {
  window.location.href = '/login.html';
}

let skillRatings = {};
let photoBase64 = null;

// Initialize skills
function initializeSkills() {
  const container = document.getElementById('skillsContainer');
  SPORTS.forEach(sport => {
    const skillDiv = document.createElement('div');
    skillDiv.className = 'skill-item';
    skillDiv.innerHTML = `
      <div class="skill-name">
        <div class="skill-icon">
          <i class="fas ${sport.icon}"></i>
        </div>
        ${sport.name}
      </div>
      <div class="star-rating" data-skill="${sport.key}">
        ${[1, 2, 3, 4, 5].map(i => `
          <div class="star" data-rating="${i}">
            <i class="fas fa-star"></i>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(skillDiv);

    // Add star click handlers
    skillDiv.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', (e) => {
        const rating = parseInt(star.dataset.rating);
        const starsContainer = skillDiv.querySelector('.star-rating');
        skillRatings[sport.key] = rating;
        
        starsContainer.querySelectorAll('.star').forEach((s, idx) => {
          if (idx < rating) s.classList.add('active');
          else s.classList.remove('active');
        });
      });
    });
  });
}

// Photo upload
document.getElementById('photoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    photoBase64 = event.target.result;
    document.getElementById('photoPreview').innerHTML = 
      `<img src="${photoBase64}" alt="Profile photo">`;
  };
  reader.readAsDataURL(file);
});

// Form submit
document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const fullName = document.getElementById('fullName').value.trim();
  if (!fullName) {
    showMessage('Name is required', 'error');
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.classList.add('loading');
  submitBtn.textContent = 'Saving...';

  try {
    const response = await fetch(`${API_BASE}/api/members/${memberId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name: fullName,
        photo_url: photoBase64 || null,
        bio: document.getElementById('bio').value || null,
        date_of_birth: document.getElementById('dateOfBirth').value || null,
        gender: document.getElementById('gender').value || null,
        skills: Object.keys(skillRatings).length > 0 ? skillRatings : null
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to update profile');
    }

    showMessage('Profile complete! Redirecting to dashboard...', 'success');
    setTimeout(() => {
      window.location.href = '/ffp-member-dashboard.html';
    }, 1500);

  } catch (error) {
    console.error('Profile update error:', error);
    showMessage(error.message, 'error');
    submitBtn.classList.remove('loading');
    submitBtn.textContent = 'Complete Profile';
  }
});

function showMessage(msg, type) {
  const box = document.getElementById('messageBox');
  box.className = type;
  box.textContent = msg;
}

// Initialize on load
initializeSkills();
</script>

</body>
</html>
