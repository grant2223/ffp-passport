<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">

<style>
:root {
  --blue: #1980AD;
  --blue-lt: #2ba8e0;
  --blue-dk: #0f5a7a;
  --navy: #0b1c28;
  --navy-2: #0d2030;
  --navy-deep: #081420;
  --muted: #6a90a8;
  --muted-lt: #9dbdd0;
  --gold: #f4a934;
  --border: rgba(43, 168, 224, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  background: var(--navy-deep);
  color: #fff;
}

.app {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 620px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  max-height: 90vh;
  overflow-y: auto;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.logo {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.logo span { color: var(--blue-lt); }

.subtitle {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 24px;
}

.heading {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, var(--blue-lt) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subheading {
  font-size: 13px;
  color: var(--muted-lt);
  line-height: 1.6;
}

.form-group {
  margin-bottom: 28px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--blue-lt);
  margin-bottom: 10px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 16px;
  background: rgba(11, 28, 40, 0.5);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  transition: all 0.2s;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--blue-lt);
  background: rgba(11, 28, 40, 0.8);
  box-shadow: 0 0 12px rgba(43, 168, 224, 0.1);
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.photo-upload {
  position: relative;
  width: 100px;
  height: 100px;
  margin: 0 auto 28px;
  cursor: pointer;
}

.photo-preview {
  width: 100%;
  height: 100%;
  border-radius: 14px;
  border: 2px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(43, 168, 224, 0.05);
  font-size: 32px;
  transition: all 0.3s;
  color: var(--blue-lt);
}

.photo-upload:hover .photo-preview {
  border-color: var(--blue-lt);
  background: rgba(43, 168, 224, 0.12);
  transform: scale(1.05);
}

.photo-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

#photoInput { display: none; }

.search-box {
  position: relative;
  margin-bottom: 16px;
}

.search-box input {
  width: 100%;
  padding: 12px 16px 12px 40px;
  background: rgba(11, 28, 40, 0.5);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
}

.search-box input:focus {
  outline: none;
  border-color: var(--blue-lt);
  background: rgba(11, 28, 40, 0.8);
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 12px;
  pointer-events: none;
}

.sports-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  max-height: 350px;
  overflow-y: auto;
  padding: 4px;
  margin-bottom: 16px;
}

.sport-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  background: rgba(43, 168, 224, 0.08);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
}

.sport-card:hover {
  background: rgba(43, 168, 224, 0.12);
  border-color: rgba(43, 168, 224, 0.25);
}

.sport-card input {
  cursor: pointer;
  width: 16px;
  height: 16px;
  accent-color: var(--blue-lt);
  flex-shrink: 0;
}

.sport-name {
  font-size: 12px;
  font-weight: 600;
  flex: 1;
}

.selected-skills {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.skill-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  background: rgba(43, 168, 224, 0.08);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  transition: all 0.2s;
  font-size: 12px;
}

.skill-item:hover {
  background: rgba(43, 168, 224, 0.12);
}

.skill-name {
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.skill-remove {
  background: rgba(220, 53, 69, 0.2);
  color: #ff6b6b;
  border: none;
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.2s;
}

.skill-remove:hover {
  background: rgba(220, 53, 69, 0.3);
}

.star-rating {
  display: flex;
  gap: 4px;
}

.star {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: #444;
  font-size: 11px;
}

.star:hover,
.star.active {
  color: var(--gold);
  transform: scale(1.15);
}

.button-group {
  display: flex;
  gap: 12px;
  margin-top: 32px;
}

.btn {
  flex: 1;
  padding: 14px 24px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.5px;
  transition: all 0.3s;
  text-transform: uppercase;
}

.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-lt));
  color: #fff;
  box-shadow: 0 4px 16px rgba(43, 168, 224, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(43, 168, 224, 0.4);
}

.btn-secondary {
  background: rgba(43, 168, 224, 0.1);
  border: 1px solid var(--border);
  color: var(--muted-lt);
}

.btn-secondary:hover {
  border-color: var(--blue-lt);
  background: rgba(43, 168, 224, 0.15);
}

.error {
  background: rgba(220, 53, 69, 0.12);
  border: 1px solid rgba(220, 53, 69, 0.3);
  color: #ff6b6b;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 12px;
  margin-bottom: 20px;
}

.success {
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #51cf66;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 12px;
  margin-bottom: 20px;
}

.loading { opacity: 0.6; pointer-events: none; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(43, 168, 224, 0.05); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: rgba(43, 168, 224, 0.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(43, 168, 224, 0.5); }

@media (max-width: 480px) {
  .container { padding: 32px 24px; }
  .heading { font-size: 24px; }
  .sports-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">
  <div class="container">
    <div class="header">
      <div class="logo">
        <i class="fas fa-passport"></i>
        FFP <span>PASSPORT</span>
      </div>
      <div class="subtitle">Find Fit People</div>
      <h1 class="heading">Complete Your Profile</h1>
      <p class="subheading">Rate your skills to find your perfect match</p>
    </div>

    <form id="profileForm">
      <div id="messageBox"></div>

      <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
        <div class="photo-preview" id="photoPreview">
          <i class="fas fa-camera"></i>
        </div>
        <input type="file" id="photoInput" accept="image/*">
      </div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dateOfBirth">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="">Select...</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea id="bio" placeholder="Tell us about yourself (max 200 chars)"></textarea>
      </div>

      <div class="form-group">
        <label>Sport & Skill Levels (0 = Never done, 5 = Professional)</label>
        
        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="sportSearch" placeholder="Search 120+ sports...">
        </div>

        <div class="sports-grid" id="sportsGrid"></div>

        <div class="selected-skills" id="selectedSkillsContainer" style="display: none;">
          <label style="font-size: 12px; color: var(--muted); margin-bottom: 8px; display: block;">Your Skills:</label>
          <div id="selectedSkills"></div>
        </div>
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Back</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Complete Profile</button>
      </div>
    </form>
  </div>
</div>

    { name: 'Cross Country Skiing', icon: 'fa-snowflake', key: 'cross_country_skiing' },
    { name: 'Snowboarding', icon: 'fa-snowflake', key: 'snowboarding' },
    { name: 'Backcountry Skiing', icon: 'fa-snowflake', key: 'backcountry_skiing' },
    { name: 'Sledding / Tobogganing', icon: 'fa-snowflake', key: 'sledding' },
    { name: 'Snowshoeing', icon: 'fa-snowflake', key: 'snowshoeing' },
    { name: 'Ice Skating', icon: 'fa-snowflake', key: 'ice_skating' },
    { name: 'Mountaineering', icon: 'fa-mountain', key: 'mountaineering' },
    { name: 'Alpine Mountaineering', icon: 'fa-mountain', key: 'alpine_mountaineering' },
    { name: 'Paragliding', icon: 'fa-person-hiking', key: 'paragliding' },
    { name: 'Hang Gliding', icon: 'fa-person-hiking', key: 'hang_gliding' },
    { name: 'Skydiving', icon: 'fa-person-hiking', key: 'skydiving' },

    { name: 'Geocaching', icon: 'fa-compass', key: 'geocaching' },
  ]
};

const memberId = new URLSearchParams(window.location.search).get('id') || sessionStorage.getItem('member_id');

if (!memberId) window.location.href = '/login.html';

let skillRatings = {}, selectedSports = new Set(), photoBase64 = null;

function getAllSports() {
  let allSports = [];
  for (const category in SPORTS_BY_CATEGORY) allSports = allSports.concat(SPORTS_BY_CATEGORY[category]);
  return allSports;
}

function initializeSports(filterText = '') {
  const grid = document.getElementById('sportsGrid');
  grid.innerHTML = '';
  const allSports = getAllSports();
  const filtered = allSports.filter(sport => sport.name.toLowerCase().includes(filterText.toLowerCase()));

  filtered.forEach(sport => {
    const card = document.createElement('label');
    card.className = 'sport-card';
    card.innerHTML = `<input type="checkbox" data-sport-key="${sport.key}" value="${sport.key}"><span class="sport-name">${sport.name}</span>`;
    grid.appendChild(card);

    card.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) { selectedSports.add(sport.key); skillRatings[sport.key] = 0; }
      else { selectedSports.delete(sport.key); delete skillRatings[sport.key]; }
      renderSelectedSkills();
    });
  });
}

function renderSelectedSkills() {
  const container = document.getElementById('selectedSkills');
  const parentContainer = document.getElementById('selectedSkillsContainer');
  
  if (selectedSports.size === 0) { parentContainer.style.display = 'none'; return; }

  parentContainer.style.display = 'block';
  container.innerHTML = '';

  const allSports = getAllSports();
  const sportMap = {};
  allSports.forEach(s => sportMap[s.key] = s);

  Array.from(selectedSports).forEach(sportKey => {
    const sport = sportMap[sportKey];
    const skillDiv = document.createElement('div');
    skillDiv.className = 'skill-item';
    skillDiv.innerHTML = `
      <div class="skill-name"><i class="fas ${sport.icon}"></i>${sport.name}</div>
      <div style="display: flex; gap: 8px; align-items: center;">
        <div class="star-rating" data-skill="${sport.key}">${[1,2,3,4,5].map(i => `<div class="star" data-rating="${i}"><i class="fas fa-star"></i></div>`).join('')}</div>
        <button type="button" class="skill-remove" onclick="removeSport('${sportKey}')">Remove</button>
      </div>
    `;
    container.appendChild(skillDiv);

    skillDiv.querySelectorAll('.star').forEach(star => {
      const rating = parseInt(star.dataset.rating);
      if (skillRatings[sport.key] >= rating) star.classList.add('active');
      star.addEventListener('click', (e) => {
        e.preventDefault();
        skillRatings[sport.key] = rating;
        skillDiv.querySelectorAll('.star').forEach((s, idx) => { idx < rating ? s.classList.add('active') : s.classList.remove('active'); });
      });
    });
  });
}

function removeSport(sportKey) {
  selectedSports.delete(sportKey);
  delete skillRatings[sportKey];
  document.querySelector(`input[data-sport-key="${sportKey}"]`).checked = false;
  renderSelectedSkills();
}

document.getElementById('sportSearch').addEventListener('input', (e) => initializeSports(e.target.value));

document.getElementById('photoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    photoBase64 = event.target.result;
    document.getElementById('photoPreview').innerHTML = `<img src="${photoBase64}" alt="Profile photo">`;
  };
  reader.readAsDataURL(file);
});

document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fullName = document.getElementById('fullName').value.trim();
  if (!fullName) { showMessage('Name is required', 'error'); return; }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.classList.add('loading');
  submitBtn.textContent = 'Saving...';

  try {
    const response = await fetch(`${API_BASE}/api/members/${memberId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name: fullName,
        photo_url: photoBase64 || null,
        bio: document.getElementById('bio').value || null,
        date_of_birth: document.getElementById('dateOfBirth').value || null,
        gender: document.getElementById('gender').value || null,
        skills: Object.keys(skillRatings).length > 0 ? skillRatings : null
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Failed to update profile');

    showMessage('Profile complete! Redirecting to dashboard...', 'success');
    setTimeout(() => { window.location.href = '/ffp-member-dashboard.html'; }, 1500);

  } catch (error) {
    console.error('Profile update error:', error);
    showMessage(error.message, 'error');
    submitBtn.classList.remove('loading');
    submitBtn.textContent = 'Complete Profile';
  }
});

function showMessage(msg, type) {
  const box = document.getElementById('messageBox');
  box.className = type;
  box.textContent = msg;
}

initializeSports();
</script>
