<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFP Passport — Complete Your Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ffp-blue: #2ba8e0;
      --ffp-blue-dark: #1980AD;
      --ffp-bg: #081420;
      --ffp-bg-2: #0f1e2e;
      --ffp-bg-card: rgba(15, 30, 46, 0.5);
      --ffp-border: rgba(43, 168, 224, 0.10);
      --ffp-border-mid: rgba(43, 168, 224, 0.20);
      --ffp-text: #e8eef4;
      --ffp-text-muted: #8a99a8;
      --ffp-yellow: #FFCC00;
      --ffp-green: #4ade80;
      --ffp-red: #ef4444;
      --r-md: 10px;
      --r-lg: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--ffp-bg);
      color: var(--ffp-text);
      font-weight: 400;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 100px;
      background: var(--ffp-bg);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-brand {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    .logo-brand span {
      color: var(--ffp-blue);
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 700;
      color: var(--ffp-text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
    }

    .screen-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .screen-sub {
      font-size: 13px;
      color: var(--ffp-text-muted);
      margin-bottom: 24px;
      line-height: 1.6;
      font-weight: 500;
    }

    /* Form styles */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--ffp-text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 7px;
      display: block;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      background: var(--ffp-bg-card);
      border: 1px solid var(--ffp-border-mid);
      border-radius: var(--r-md);
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--ffp-text);
      font-family: 'Montserrat', system-ui, sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--ffp-blue);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--ffp-text-muted);
      font-weight: 500;
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Photo upload */
    .photo-upload {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .photo-preview {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--ffp-blue-dark), var(--ffp-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      border: 2px solid rgba(43, 168, 224, 0.3);
      overflow: hidden;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-input-wrap {
      flex: 1;
    }

    #photo-file {
      display: none;
    }

    .photo-btn {
      display: inline-block;
      padding: 8px 14px;
      background: var(--ffp-bg-card);
      border: 1px solid var(--ffp-border-mid);
      border-radius: var(--r-md);
      font-size: 12px;
      font-weight: 700;
      color: var(--ffp-text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Montserrat', system-ui, sans-serif;
    }

    .photo-btn:hover {
      border-color: var(--ffp-blue);
      color: var(--ffp-text);
    }

    /* Fitness level pills */
    .fitness-levels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .fitness-pill {
      background: var(--ffp-bg-card);
      border: 1px solid var(--ffp-border-mid);
      border-radius: var(--r-md);
      padding: 11px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ffp-text-muted);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: 'Montserrat', system-ui, sans-serif;
    }

    .fitness-pill:hover {
      border-color: var(--ffp-blue);
      color: var(--ffp-text);
    }

    .fitness-pill.selected {
      background: rgba(43, 168, 224, 0.15);
      border-color: var(--ffp-blue);
      color: var(--ffp-text);
    }

    /* Interests checkboxes */
    .interests-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .interest-check {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--ffp-bg-card);
      border: 1px solid var(--ffp-border-mid);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all 0.2s;
    }

    .interest-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--ffp-blue);
    }

    .interest-check label {
      font-size: 12px;
      font-weight: 700;
      color: var(--ffp-text-muted);
      cursor: pointer;
      flex: 1;
    }

    .interest-check input[type="checkbox"]:checked + label {
      color: var(--ffp-text);
    }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: var(--r-md);
      font-size: 15px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      font-family: 'Montserrat', system-ui, sans-serif;
      text-align: center;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: var(--ffp-blue);
      color: #fff;
      box-shadow: 0 4px 12px rgba(43, 168, 224, 0.25);
    }

    .btn-primary:hover {
      background: var(--ffp-blue-dark);
      box-shadow: 0 6px 16px rgba(43, 168, 224, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-primary.loading {
      position: relative;
      color: transparent;
    }

    .btn-primary.loading::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      top: 50%;
      left: 50%;
      margin-left: -8px;
      margin-top: -8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error/Success messages */
    .error-msg {
      color: var(--ffp-red);
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      text-align: center;
      min-height: 18px;
    }

    .success-msg {
      color: var(--ffp-green);
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--ffp-border);
      margin: 24px 0;
    }

    .info-box {
      background: rgba(43, 168, 224, 0.05);
      border: 1px solid var(--ffp-border-mid);
      border-radius: var(--r-md);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--ffp-text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .info-box strong {
      color: var(--ffp-text);
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .page {
        padding: 24px 16px 80px;
      }

      .logo-brand {
        font-size: 18px;
      }

      .screen-title {
        font-size: 22px;
      }

      .wrap {
        max-width: 100%;
      }

      .fitness-levels,
      .interests-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <div class="logo-brand">FFP <span>PASSPORT</span></div>
      <div class="logo-sub">Find Fit People</div>
    </div>

    <div class="wrap">
      <div class="screen-title">Complete Your Profile</div>
      <div class="screen-sub">Tell us about yourself so we can match you with the right community and events.</div>

      <div class="info-box">
        You can update this anytime. Only <strong>Full Name</strong> and <strong>Fitness Level</strong> are required to continue.
      </div>

      <form id="profile-form">
        <!-- Full Name -->
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" id="full_name" class="form-input" placeholder="e.g., Grant Hermanus" required>
        </div>

        <!-- Date of Birth -->
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="date_of_birth" class="form-input">
        </div>

        <!-- Photo (Optional) -->
        <div class="form-group">
          <label class="form-label">Profile Photo (Optional)</label>
          <div class="photo-upload">
            <div class="photo-preview" id="photo-preview">
              <span id="photo-initials">GH</span>
            </div>
            <div class="photo-input-wrap">
              <input type="file" id="photo-file" accept="image/*">
              <button type="button" class="photo-btn" onclick="document.getElementById('photo-file').click()">
                Upload Photo
              </button>
              <div style="font-size: 10px; color: var(--ffp-text-muted); margin-top: 6px;">
                JPG, PNG, up to 5MB
              </div>
            </div>
          </div>
        </div>

        <!-- Fitness Level -->
        <div class="form-group">
          <label class="form-label">Fitness Level *</label>
          <div class="fitness-levels" id="fitness-levels">
            <button type="button" class="fitness-pill" data-level="Beginner">Beginner</button>
            <button type="button" class="fitness-pill" data-level="Intermediate">Intermediate</button>
            <button type="button" class="fitness-pill" data-level="Advanced">Advanced</button>
            <button type="button" class="fitness-pill" data-level="Elite">Elite</button>
            <button type="button" class="fitness-pill" data-level="Professional">Professional</button>
          </div>
          <input type="hidden" id="fitness_level">
        </div>

        <!-- Bio -->
        <div class="form-group">
          <label class="form-label">About You (Optional)</label>
          <textarea id="bio" class="form-textarea" placeholder="Tell us about your fitness journey, interests, or what you're looking for in the FFP community..."></textarea>
        </div>

        <!-- Interests -->
        <div class="form-group">
          <label class="form-label">Interests</label>
          <div class="interests-grid" id="interests-grid">
            <div class="interest-check">
              <input type="checkbox" id="interest-fitness" value="Fitness">
              <label for="interest-fitness">Fitness</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-wellness" value="Wellness">
              <label for="interest-wellness">Wellness</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-recovery" value="Recovery">
              <label for="interest-recovery">Recovery</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-sports" value="Sports">
              <label for="interest-sports">Sports</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-food" value="Food">
              <label for="interest-food">Healthy Food</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-adventure" value="Adventure">
              <label for="interest-adventure">Adventure</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-community" value="Community">
              <label for="interest-community">Community</label>
            </div>
            <div class="interest-check">
              <input type="checkbox" id="interest-longevity" value="Longevity">
              <label for="interest-longevity">Longevity</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Complete Profile & Enter Dashboard</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────────────────
    // STATE & INITIALIZATION
    // ────────────────────────────────────────────────────────────

    let selectedFitnessLevel = null;
    let photoBase64 = null;
    const API_BASE = 'https://ffp-passport-backend.vercel.app';

    // Get member ID from URL
    const memberId = new URLSearchParams(window.location.search).get('id');
    if (!memberId) {
      document.getElementById('error-msg').textContent = 'Missing member ID. Please log in again.';
      setTimeout(() => window.location.href = 'login.html', 3000);
    }

    // Set initials from localStorage
    const memberEmail = localStorage.getItem('memberEmail') || '';
    const initials = memberEmail
      .split('@')[0]
      .split('.')
      .map(part => part[0])
      .join('')
      .toUpperCase()
      .slice(0, 2) || 'GH';
    document.getElementById('photo-initials').textContent = initials;

    // ────────────────────────────────────────────────────────────
    // PHOTO UPLOAD
    // ────────────────────────────────────────────────────────────

    document.getElementById('photo-file').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        document.getElementById('error-msg').textContent = 'Photo must be under 5MB';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(event) {
        photoBase64 = event.target.result;
        const preview = document.getElementById('photo-preview');
        preview.innerHTML = `<img src="${photoBase64}" alt="Profile">`;
      };
      reader.readAsDataURL(file);
    });

    // ────────────────────────────────────────────────────────────
    // FITNESS LEVEL SELECTION
    // ────────────────────────────────────────────────────────────

    document.querySelectorAll('.fitness-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.fitness-pill').forEach(p => p.classList.remove('selected'));
        this.classList.add('selected');
        selectedFitnessLevel = this.dataset.level;
        document.getElementById('fitness_level').value = selectedFitnessLevel;
      });
    });

    // ────────────────────────────────────────────────────────────
    // FORM SUBMISSION
    // ────────────────────────────────────────────────────────────

    document.getElementById('profile-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      // Validate required fields
      const fullName = document.getElementById('full_name').value.trim();
      if (!fullName) {
        document.getElementById('error-msg').textContent = 'Full Name is required';
        return;
      }

      if (!selectedFitnessLevel) {
        document.getElementById('error-msg').textContent = 'Please select a Fitness Level';
        return;
      }

      // Clear previous errors
      document.getElementById('error-msg').textContent = '';

      // Collect interests
      const interests = [];
      document.querySelectorAll('.interest-check input[type="checkbox"]:checked').forEach(checkbox => {
        interests.push(checkbox.value);
      });

      // Prepare payload
      const payload = {
        full_name: fullName,
        date_of_birth: document.getElementById('date_of_birth').value || null,
        fitness_level: selectedFitnessLevel,
        bio: document.getElementById('bio').value || null,
        interests: interests.length > 0 ? interests : null,
        photo_url: photoBase64 || null
      };

      // Show loading state
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        // Call backend API
        const response = await fetch(`${API_BASE}/api/members/${memberId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to update profile');
        }

        // Success! Backend has set profile_complete: true
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = `ffp-member-dashboard.html?id=${memberId}`;
        }, 500);

      } catch (error) {
        console.error('Profile submission error:', error);
        document.getElementById('error-msg').textContent = error.message || 'Something went wrong. Please try again.';
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // ────────────────────────────────────────────────────────────
    // FALLBACK: If user tries to go back to login while on this page
    // ────────────────────────────────────────────────────────────

    window.addEventListener('beforeunload', function(e) {
      // Optional: warn if form has unsaved changes
      const hasChanges = document.getElementById('full_name').value || 
                        document.getElementById('date_of_birth').value ||
                        selectedFitnessLevel ||
                        photoBase64;
      
      if (hasChanges && !window.justSubmitted) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
