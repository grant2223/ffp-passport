<!--
═══════════════════════════════════════════════════════════════════════
     FFP VERIFY — v1 (2026-05-29)
     Public landing page reached by scanning a member's Identity QR.
     URL pattern: /verify.html?p=FFP-2026-XXXX
     No auth required — anyone with the QR can see the verification card.
     Backend: GET /api/verify/:passport_no returns public-safe fields only.

     This is the "anonymous scanner" surface from [[qr-multi-purpose]].
     A provider in their dashboard would use an in-context scanner that
     reads the QR text and routes to action-specific endpoints (deal
     redeem, event check-in, etc.) — that work is task #56, separate.
═══════════════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>Verify Member — FFP Passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh;
  background: #081420;
  color: #e8eef4;
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 48px;
}
.brand { text-align: center; margin-bottom: 28px; }
.brand-name { font-size: 18px; font-weight: 900; letter-spacing: 3px; }
.brand-name span { color: #2ba8e0; }
.brand-sub { font-size: 10px; font-weight: 700; color: #6a90a8; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

.card {
  width: 100%;
  max-width: 420px;
  background: linear-gradient(180deg, rgba(15,30,46,0.85), rgba(15,30,46,0.5));
  border: 1px solid rgba(43,168,224,0.18);
  border-radius: 18px;
  padding: 28px 24px 24px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.35);
  text-align: center;
}
.photo-wrap {
  width: 140px;
  height: 180px;          /* 35:45 passport ratio */
  margin: 0 auto 18px;
  border-radius: 8px;
  background: #0f5a7a;
  background-size: cover;
  background-position: center top;
  border: 1px solid rgba(43,168,224,0.3);
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 1px;
}
.name { font-size: 22px; font-weight: 800; margin-bottom: 4px; line-height: 1.2; }
.passport-no {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: #8aa3b8;
  letter-spacing: 1.5px;
  margin-bottom: 18px;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.status-badge .material-icons { font-size: 18px; }
.status-active     { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.35); }
.status-expired    { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.35); }
.status-suspended  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.35); }
.status-pending    { background: rgba(43,168,224,0.15); color: #60c7ed; border: 1px solid rgba(43,168,224,0.35); }
.status-unknown    { background: rgba(138,153,168,0.15); color: #aab8c5; border: 1px solid rgba(138,153,168,0.35); }

/* Verified badge — separate from membership status. Only renders when
   members.verified === true (admin-approved identity check). */
.verified-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 0 0 18px;
  background: rgba(43,168,224,0.15);
  color: #60c7ed;
  border: 1px solid rgba(43,168,224,0.35);
}
.verified-badge .material-icons { font-size: 16px; }

.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 4px;
  padding-top: 18px;
  border-top: 1px solid rgba(43,168,224,0.15);
  text-align: left;
}
.meta { padding: 0 4px; }
.meta-label { font-size: 10px; font-weight: 700; color: #6a90a8; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.meta-value { font-size: 14px; font-weight: 600; color: #e8eef4; }

.footer-note {
  margin-top: 20px;
  font-size: 11px;
  color: #6a90a8;
  text-align: center;
  line-height: 1.5;
}
.footer-note a { color: #2ba8e0; text-decoration: none; }

.loading, .error {
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 40px 20px;
  color: #8aa3b8;
  font-size: 14px;
}
.error .material-icons { font-size: 48px; color: #f87171; display: block; margin: 0 auto 12px; }
.error-title { font-size: 18px; font-weight: 700; color: #e8eef4; margin-bottom: 8px; }
.error-passport { font-family: 'Courier New', monospace; color: #8aa3b8; margin-top: 8px; }

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(43,168,224,0.25);
  border-top-color: #2ba8e0;
  border-radius: 50%;
  margin: 0 auto 12px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 380px) {
  .card { padding: 22px 18px 18px; }
  .photo-wrap { width: 120px; height: 154px; font-size: 40px; }
  .name { font-size: 19px; }
  .meta-grid { gap: 10px; }
  .meta-value { font-size: 13px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">FFP <span>PASSPORT</span></div>
    <div class="brand-sub">Member Verification</div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Looking up member…</div>
    </div>
  </div>

  <div class="footer-note">
    Powered by FFP Passport ·
    <a href="https://ffppassport.com">ffppassport.com</a>
  </div>
</div>

<script>
(function () {
  'use strict';
  var API_BASE = 'https://ffp-passport-backend.vercel.app';
  var content = document.getElementById('content');

  function getParam(name) {
    var m = new RegExp('[?&]' + name + '=([^&]+)').exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function escape(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  function initials(name) {
    if (!name) return '—';
    var parts = String(name).trim().split(/\s+/);
    var first = parts[0] ? parts[0][0] : '';
    var last  = parts.length > 1 ? parts[parts.length - 1][0] : '';
    return (first + last).toUpperCase() || '—';
  }
  function statusMeta(s) {
    s = (s || 'unknown').toLowerCase();
    // NOTE: 'Verified' is NOT a membership status — it's a separate admin-set
    // identity flag (members.verified). Status labels here are lifecycle only.
    if (s === 'active')    return { cls: 'status-active',    icon: 'check_circle',     label: 'Active Member' };
    if (s === 'expired')   return { cls: 'status-expired',   icon: 'schedule',         label: 'Membership Expired' };
    if (s === 'suspended') return { cls: 'status-suspended', icon: 'block',            label: 'Suspended' };
    if (s === 'pending')   return { cls: 'status-pending',   icon: 'hourglass_top',    label: 'Pending' };
    return { cls: 'status-unknown', icon: 'help_outline', label: s.charAt(0).toUpperCase() + s.slice(1) };
  }
  function tierLabel(t) {
    t = (t || 'Member').toString();
    return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    } catch (e) { return iso; }
  }

  function renderError(title, detail, passportNo) {
    content.innerHTML =
      '<div class="error">' +
        '<span class="material-icons">error_outline</span>' +
        '<div class="error-title">' + escape(title) + '</div>' +
        '<div>' + escape(detail) + '</div>' +
        (passportNo ? '<div class="error-passport">' + escape(passportNo) + '</div>' : '') +
      '</div>';
  }

  function renderMember(m) {
    var sm = statusMeta(m.status);
    var photoStyle = m.photo_url
      ? 'background-image:url(\'' + escape(m.photo_url) + '\')'
      : '';
    var photoInitials = m.photo_url ? '' : escape(initials(m.full_name));

    var verifiedBadge = m.verified
      ? '<div class="verified-badge"><span class="material-icons">verified</span>Identity Verified</div>'
      : '';

    content.innerHTML =
      '<div class="card">' +
        '<div class="photo-wrap" style="' + photoStyle + '">' + photoInitials + '</div>' +
        '<div class="name">' + escape(m.full_name || ((m.given_names || '') + ' ' + (m.surname || ''))) + '</div>' +
        '<div class="passport-no">' + escape(m.passport_no) + '</div>' +
        '<div class="status-badge ' + sm.cls + '">' +
          '<span class="material-icons">' + sm.icon + '</span>' +
          sm.label +
        '</div>' +
        verifiedBadge +
        '<div class="meta-grid">' +
          '<div class="meta">' +
            '<div class="meta-label">Tier</div>' +
            '<div class="meta-value">' + escape(tierLabel(m.tier)) + '</div>' +
          '</div>' +
          '<div class="meta">' +
            '<div class="meta-label">Country</div>' +
            '<div class="meta-value">' + escape(m.country || '—') + '</div>' +
          '</div>' +
          '<div class="meta">' +
            '<div class="meta-label">Member Since</div>' +
            '<div class="meta-value">' + escape(fmtDate(m.member_since)) + '</div>' +
          '</div>' +
          '<div class="meta">' +
            '<div class="meta-label">Expires</div>' +
            '<div class="meta-value">' + escape(fmtDate(m.expires)) + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  async function lookup() {
    var passportNo = getParam('p');
    if (!passportNo) {
      renderError('No passport number', 'This URL is missing the member identifier. Scan a valid FFP Passport QR.', null);
      return;
    }
    try {
      var res = await fetch(API_BASE + '/api/verify/' + encodeURIComponent(passportNo));
      var data = await res.json();
      if (res.status === 404) {
        renderError('Member not found', 'No FFP Passport matches this identifier.', passportNo);
        return;
      }
      if (!res.ok || !data.success) {
        renderError('Verification failed', (data && data.error) || ('HTTP ' + res.status), passportNo);
        return;
      }
      renderMember(data.member);
    } catch (e) {
      renderError('Network error', 'Could not reach the verification service. Try again in a moment.', passportNo);
    }
  }

  lookup();
})();
</script>
</body>
</html>
